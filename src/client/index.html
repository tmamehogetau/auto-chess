<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>auto-chess-mvp client check</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      .panel {
        max-width: 640px;
        margin: 48px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
      }

      .label {
        color: #666;
      }

      .controls {
        display: grid;
        gap: 8px;
        margin: 12px 0 16px;
      }

      .row {
        display: grid;
        gap: 8px;
        grid-template-columns: 112px 1fr;
        align-items: center;
      }

      input,
      select,
      button {
        font: inherit;
        padding: 6px 8px;
        border: 1px solid #c8c8c8;
        border-radius: 4px;
        background: #fff;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .actions button {
        min-width: 120px;
      }

      .hint {
        color: #666;
        margin: 0;
        font-size: 13px;
      }

      .status {
        margin: 0;
      }

      .error {
        color: #b00020;
        min-height: 20px;
        margin: 0;
      }

      [data-set-id-display] {
        font-family: monospace;
        font-size: 15px;
      }

      [data-command-result],
      [data-self-status] {
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>SetId Display Check</h1>
      <section class="controls">
        <label class="row">
          <span class="label">Endpoint</span>
          <input data-endpoint-input type="text" />
        </label>
        <label class="row">
          <span class="label">Room</span>
          <input data-room-input type="text" />
        </label>
        <label class="row">
          <span class="label">SetId</span>
          <select data-setid-select>
            <option value="">default</option>
            <option value="set1">set1</option>
            <option value="set2">set2</option>
          </select>
        </label>
        <label class="row">
          <span class="label">Bots</span>
          <input data-autofill-input type="number" min="0" max="3" value="0" />
        </label>
        <div class="actions">
          <button data-connect-button type="button">Connect</button>
          <button data-leave-button type="button" disabled>Leave</button>
        </div>
        <label class="row">
          <span class="label">Ready</span>
          <input data-ready-checkbox type="checkbox" checked />
        </label>
        <div class="actions">
          <button data-ready-button type="button" disabled>Send Ready</button>
        </div>
        <label class="row">
          <span class="label">CmdSeq</span>
          <input data-cmdseq-input type="number" min="1" step="1" value="1" />
        </label>
        <label class="row">
          <span class="label">Placements</span>
          <input
            data-placements-input
            type="text"
            value="0:vanguard,1:assassin,4:ranger,5:ranger"
          />
        </label>
        <p class="hint">
          format: cell:unitType,cell:unitType (unitType: vanguard/ranger/mage/assassin)
        </p>
        <div class="actions">
          <button data-prep-button type="button" disabled>Send Prep Command</button>
        </div>
        <p class="status">
          <span class="label">Status:</span>
          <strong data-connection-status>idle</strong>
        </p>
        <p class="status">
          <span class="label">AutoFill:</span>
          <strong data-autofill-status>disabled</strong>
        </p>
        <p class="status">
          <span class="label">Phase:</span>
          <strong data-phase-value>-</strong>
          <span class="label">Round:</span>
          <strong data-round-value>-</strong>
        </p>
        <p class="status">
          <span class="label">Self:</span>
          <strong data-self-status>-</strong>
        </p>
        <p class="status">
          <span class="label">Command:</span>
          <strong data-command-result>-</strong>
        </p>
        <p class="error" data-connection-error></p>
      </section>
      <p>
        <span class="label">Current Set:</span>
        <strong data-set-id-display>-</strong>
      </p>
      <p class="label">Manual browser check template.</p>
    </main>
    <script type="module" src="./manual-check.js"></script>
  </body>
</html>
