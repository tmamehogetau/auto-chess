<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Chess MVP - Shop Mock</title>
    <link rel="icon" href="./mock-assets/battle-icon-gold.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./shop-mock.css" />
  </head>
  <body>
    <main class="shop-mock-app" data-shop-mock-app data-shop-mock-theme="remilia">
      <section class="shop-mock-stage" data-shop-mock-stage>
        <header class="shop-mock-top-hud" data-shop-mock-top-hud></header>

        <section class="shop-mock-trading-hall" data-shop-mock-trading-hall>
          <div
            class="shop-mock-stage-illustration"
            data-shop-mock-stage-illustration
            aria-hidden="true"
          ></div>
          <div class="shop-mock-shelf-layer" data-shop-mock-shelf-layer aria-hidden="true"></div>
          <div class="shop-mock-ornament-layer" data-shop-mock-ornaments aria-hidden="true"></div>
          <div class="shop-mock-atmosphere-layer" data-shop-mock-atmosphere aria-hidden="true"></div>
          <div class="shop-mock-arcana-layer" data-shop-mock-arcana aria-hidden="true"></div>

          <aside class="shop-mock-detail-wing" data-shop-mock-detail-wing></aside>

          <section class="shop-mock-shop-counter" data-shop-mock-shop-counter>
            <div
              class="shop-mock-counter-surface"
              data-shop-mock-counter-surface
              aria-hidden="true"
            ></div>
            <div class="shop-mock-common-shop" data-shop-mock-common-shop></div>
            <div class="shop-mock-exclusive-shop" data-shop-mock-exclusive-shop></div>
            <div class="shop-mock-upgrade-shop" data-shop-mock-upgrade-shop></div>
            <div class="shop-mock-reroll-strip" data-shop-mock-reroll-strip></div>
          </section>

          <aside class="shop-mock-player-wing" data-shop-mock-player-wing></aside>
          <footer class="shop-mock-guidance-rail" data-shop-mock-guidance-rail></footer>
        </section>
      </section>
    </main>

    <script type="module" src="./shop-mock.js"></script>
  </body>
</html>
