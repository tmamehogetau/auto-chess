<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>auto-chess-mvp client check</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      .panel {
        max-width: 420px;
        margin: 48px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
      }

      .label {
        color: #666;
      }

      [data-set-id-display] {
        font-family: monospace;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>SetId Display Check</h1>
      <p>
        <span class="label">Current Set:</span>
        <strong data-set-id-display>-</strong>
      </p>
      <p class="label">`attachSetIdDisplay()` の表示確認用テンプレートです。</p>
    </main>
  </body>
</html>
