name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Verify (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - label: core
          node-version: 20.x
          verify-stages: typecheck,client,server-audit,server-parallel,server-serial
        - label: e2e-a
          node-version: 20.x
          verify-stages: e2e-a
        - label: e2e-b
          node-version: 20.x
          verify-stages: e2e-b

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run verify:ci
      run: npm run verify:ci
      env:
        SUPPRESS_VERBOSE_TEST_LOGS: "true"
        VERIFY_CI_STAGES: ${{ matrix.verify-stages }}

  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: verify

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run coverage gate
      run: npm run test:coverage
